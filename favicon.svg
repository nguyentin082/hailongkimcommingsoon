<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background - Transparent -->
  
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#0ea5e9" stroke-width="3"/>
  
  <!-- Cardinal direction circle -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#0ea5e9" stroke-width="1" opacity="0.5"/>
  
  <!-- Compass rose points -->
  <!-- North -->
  <path d="M 100 30 L 95 60 L 100 55 L 105 60 Z" fill="#fbbf24"/>
  <!-- East -->
  <path d="M 170 100 L 140 95 L 145 100 L 140 105 Z" fill="#0ea5e9"/>
  <!-- South -->
  <path d="M 100 170 L 105 140 L 100 145 L 95 140 Z" fill="#0ea5e9"/>
  <!-- West -->
  <path d="M 30 100 L 60 105 L 55 100 L 60 95 Z" fill="#0ea5e9"/>
  
  <!-- Inner compass circle -->
  <circle cx="100" cy="100" r="50" fill="none" stroke="#fbbf24" stroke-width="2"/>
  
  <!-- Compass needle - North arrow (red/gold) -->
  <path d="M 100 60 L 85 95 L 95 90 L 100 100 L 105 90 L 115 95 Z" fill="#f59e0b"/>
  
  <!-- Compass needle - South arrow (blue) -->
  <path d="M 100 140 L 115 105 L 105 110 L 100 100 L 95 110 L 85 105 Z" fill="#0ea5e9" opacity="0.6"/>
  
  <!-- Center circle -->
  <circle cx="100" cy="100" r="8" fill="#fbbf24"/>
  <circle cx="100" cy="100" r="5" fill="#020617"/>
</svg>